name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun test src/index.test.ts src/client.test.ts src/config.test.ts src/metrics.test.ts src/normalize.test.ts --coverage --coverage-reporter=lcov --coverage-reporter=text
      - run: npx tsc --noEmit
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          fail_ci_if_error: false

  adapter-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapter
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: adapter -> target
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo check

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  integration:
    needs: [test, adapter-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Clone harness repo
        run: git clone --depth 1 https://github.com/sondera-ai/sondera-coding-agent-hooks.git /tmp/harness
      - name: Build harness server
        run: cargo build --bin sondera-harness-server
        working-directory: /tmp/harness
      - name: Build adapter
        run: cargo build --bin sondera-opencode-adapter
        working-directory: adapter
      - name: Install plugin deps
        run: bun install
      - name: Run integration tests
        run: sudo mkdir -p /var/run/sondera && sudo chown $USER /var/run/sondera && bun test src/integration.test.ts --timeout 30000
        env:
          SONDERA_HARNESS_REPO: /tmp/harness
          SONDERA_ADAPTER_BIN: ${{ github.workspace }}/adapter/target/debug/sondera-opencode-adapter
          SONDERA_SOCKET: /var/run/sondera/sondera-harness.sock
