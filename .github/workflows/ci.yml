name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["coverage-badge.json"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test --coverage --coverage-reporter=lcov --coverage-reporter=text 2>&1 | tee coverage-output.txt
      - run: npx tsc --noEmit
      - name: Extract coverage
        id: coverage
        run: |
          pct=$(grep "All files" coverage-output.txt | awk -F'|' '{gsub(/ /, "", $2); print $2}')
          echo "percent=$pct" >> "$GITHUB_OUTPUT"
      - name: Create coverage badge
        if: github.event_name == 'push'
        run: |
          pct=$(grep "All files" coverage-output.txt | awk -F'|' '{gsub(/ /, "", $2); print $2}')
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"brightgreen"}\n' "$pct" > coverage-badge.json
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: coverage-badge
          path: coverage-badge.json

  adapter-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapter
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: adapter -> target
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo check

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
