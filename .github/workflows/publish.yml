name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci || npm install
      - run: npm publish --provenance --access public

  build-adapter:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked
      - name: Build adapter (cross)
        if: matrix.use-cross
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cross build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Build adapter (native)
        if: ${{ !matrix.use-cross }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sondera-opencode-adapter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sondera-opencode-adapter
          if-no-files-found: error

  github-release:
    needs: [publish-npm, build-adapter]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            cp "${dir}sondera-opencode-adapter" "release-assets/sondera-opencode-adapter-${target}"
            chmod +x "release-assets/sondera-opencode-adapter-${target}"
          done
          ls -la release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
