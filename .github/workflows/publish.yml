name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci || npm install
      - run: npm publish --provenance --access public || echo "Package version may already exist"

  publish-github:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
      - run: npm install
      - run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-adapter:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked
      - name: Build adapter (cross)
        if: matrix.use-cross
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cross build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Build adapter (native)
        if: ${{ !matrix.use-cross }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Locate binary
        run: |
          find target -name "sondera-opencode-adapter" -type f || echo "not found in target/"
          find adapter/target -name "sondera-opencode-adapter" -type f 2>/dev/null || echo "not found in adapter/target/"
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: sondera-opencode-adapter-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sondera-opencode-adapter
            adapter/target/${{ matrix.target }}/release/sondera-opencode-adapter
          if-no-files-found: error
      - name: Attest binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/sondera-opencode-adapter
            adapter/target/${{ matrix.target }}/release/sondera-opencode-adapter

  github-release:
    needs: [build-adapter]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            binary=$(find "$dir" -name "sondera-opencode-adapter" -type f | head -1)
            if [ -n "$binary" ]; then
              cp "$binary" "release-assets/sondera-opencode-adapter-${target}"
              chmod +x "release-assets/sondera-opencode-adapter-${target}"
            fi
          done
          ls -la release-assets/
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
