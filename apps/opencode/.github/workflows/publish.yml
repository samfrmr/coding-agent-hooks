name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: npm install -g npm@latest
      - run: npm ci || npm install
      - run: npm run sync-bundle
      - run: npm publish --provenance --access public || echo "Package version may already exist"

  publish-github:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: npm install
      - run: npm run sync-bundle
      - run: npm pkg set name=@daviey/opencode-sondera
      - run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-adapter:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked
      - name: Build adapter (cross)
        if: matrix.use-cross
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          CROSS_CONFIG: ${{ github.workspace }}/Cross.toml
        run: cross build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Build adapter (native)
        if: ${{ !matrix.use-cross }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --manifest-path adapter/Cargo.toml --target ${{ matrix.target }}
      - name: Locate binary
        run: |
          find target -name "sondera-opencode-adapter" -type f || echo "not found in target/"
          find adapter/target -name "sondera-opencode-adapter" -type f 2>/dev/null || echo "not found in adapter/target/"
      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sondera-opencode-adapter-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sondera-opencode-adapter
            adapter/target/${{ matrix.target }}/release/sondera-opencode-adapter
          if-no-files-found: error
      - name: Attest binary
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/sondera-opencode-adapter
            adapter/target/${{ matrix.target }}/release/sondera-opencode-adapter

  github-release:
    needs: [build-adapter]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun run sync-bundle
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: false
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            target=${artifact_name#sondera-opencode-adapter-}
            binary=$(find "$dir" -name "sondera-opencode-adapter" -type f | head -1)
            if [ -n "$binary" ]; then
              cp "$binary" "release-assets/sondera-opencode-adapter-${target}"
              chmod +x "release-assets/sondera-opencode-adapter-${target}"
            fi
          done
          ls -la release-assets/
          cp sondera-bundled.ts release-assets/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
